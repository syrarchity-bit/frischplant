<style>
:root{
  --bg:#c2e7f6; --surface:#ffffff; --ink:#1d2922; --muted:#6c766e;
  --accent:#2f7d4f; --accent-d:#256340; --accent-soft:#e7f0e9;
  --line:#e4e1d8; --line-2:#eeece4; --field:#fcfcfa;
  --miss:#d24b4b; --miss-soft:#fbeceb; --rain:#2f6fbf; --rain-soft:rgba(47,111,191,.10);
  --glow:rgba(255,255,255,.14); --r:16px; --sh:0 1px 2px rgba(29,41,34,.05), 0 8px 24px -16px rgba(29,41,34,.25);
}
[data-theme="dark"]{
  --bg:#12171a; --surface:#1b2226; --ink:#e9ede9; --muted:#98a39b;
  --accent:#4fa873; --accent-d:#73c293; --accent-soft:rgba(79,168,115,.16);
  --line:#2a3338; --line-2:#222a2e; --field:#161c1f;
  --miss:#e16a6a; --miss-soft:rgba(225,106,106,.15); --rain:#7fb1f0; --rain-soft:rgba(127,177,240,.14);
  --glow:rgba(47,125,79,.05); --sh:0 1px 2px rgba(0,0,0,.3), 0 10px 26px -16px rgba(0,0,0,.6);
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:"IBM Plex Sans",system-ui,sans-serif;font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;
  background-image:radial-gradient(120% 80% at 100% 0%,var(--glow),transparent 60%),radial-gradient(100% 70% at 0% 100%,var(--glow),transparent 55%);
  min-height:100dvh;padding:0 16px env(safe-area-inset-bottom) 16px;transition:background .25s,color .25s}
.wrap{max-width:720px;margin:0 auto;position:relative;z-index:1}

.forest{position:fixed;left:0;right:0;bottom:0;height:40vh;max-height:360px;z-index:0;pointer-events:none;overflow:hidden;opacity:.06;color:var(--accent)}
.forest svg{width:100%;height:100%;display:block}
[data-theme="dark"] .forest{opacity:.10}

header{padding:24px 2px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:flex-end;gap:12px;min-width:0}
.hd-in{display:block;padding:18px 2px 12px}
.hd-ctlbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:18px}
.hd-wx{display:flex;align-items:center;gap:13px;font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums}
.hd-wx .wx-item{display:inline-flex;align-items:center;gap:4px}
.hd-wx .wx-item b{font-weight:600;color:var(--ink)}
.hd-wx svg{opacity:.7}
.hd-wx .wx-muted{opacity:.5}
.hd-btns{display:flex;gap:10px;align-items:center;flex:none}
.hd-main{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:12px}
.hd-main .wm{min-width:0}
.hd-main .bk-scene{flex:none}
.hd-badge{margin-top:8px}
@media(max-width:430px){.hd-main{gap:10px}.hd-wx{gap:9px;font-size:12px}}
.title-h{font-family:"Fraunces",serif;font-weight:700;font-size:26px;letter-spacing:-.01em;line-height:1;margin:0}
.wm .sub{margin-top:4px;font-size:13px;color:var(--muted);text-transform:lowercase;letter-spacing:.02em}
.bk-mark{width:54px;height:auto;flex:none}
.bk-hero{width:86px;height:auto;display:block;margin:0 auto 14px}
@media(max-width:430px){.title-h{font-size:22px}.bk-mark{width:44px}.who{font-size:12px}}
.bk-breath{transform-box:fill-box;transform-origin:50% 95%;animation:bk-breath 4s ease-in-out infinite}
.bk-eye{transform-box:fill-box;transform-origin:center;animation:bk-blink 6s ease-in-out infinite}
@keyframes bk-breath{0%,100%{transform:scale(1,1)}50%{transform:scale(1.02,.99)}}
@keyframes bk-blink{0%,92%,100%{transform:scaleY(1)}95%{transform:scaleY(.08)}98%{transform:scaleY(1)}}
@media(prefers-reduced-motion:reduce){.bk-breath,.bk-eye{animation:none}}
.hd-right{flex:none;display:flex;align-items:flex-start;gap:10px}
.icon-btn{appearance:none;width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:var(--surface);color:var(--ink);display:grid;place-items:center;cursor:pointer;transition:border-color .15s,transform .1s}
.icon-btn:active{transform:scale(.94)}
.who{text-align:right;font-size:12.5px;color:var(--muted);max-width:170px}
.badge{display:inline-block;margin-top:4px;padding:3px 9px;border-radius:999px;background:var(--accent-soft);color:var(--accent-d);font-weight:600;font-size:11.5px}
.linkbtn{appearance:none;border:0;background:none;color:var(--accent-d);font:inherit;font-size:12.5px;cursor:pointer;padding:0;text-decoration:underline;text-underline-offset:2px}

.demo-bar{background:var(--accent-soft);color:var(--accent-d);border-radius:12px;padding:9px 13px;font-size:12.5px;margin:2px 0 14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.toggle{display:inline-flex;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:3px;gap:3px}
.toggle button{appearance:none;border:0;background:none;font:inherit;font-size:12px;font-weight:600;padding:5px 11px;border-radius:999px;cursor:pointer;color:var(--muted)}
.toggle button[aria-pressed="true"]{background:var(--accent);color:#fff}
.demo-bar .toggle{margin-left:auto}
.adminnav{display:flex;gap:8px;align-items:center;margin:2px 0 14px}

.mnav{display:flex;align-items:center;gap:10px;margin:2px 0 14px}
.mnav button{appearance:none;width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:var(--surface);color:var(--ink);cursor:pointer;display:grid;place-items:center;font-size:18px;line-height:1}
.mnav button:disabled{opacity:.35;cursor:default}
.mnav .lbl{font-weight:600;font-size:15px;min-width:150px;text-align:center;text-transform:capitalize}
.exprow{display:flex;gap:9px;margin:0 0 14px;flex-wrap:wrap}
.exprow .btn{padding:8px 14px;font-size:13px}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:14px;overflow:hidden;transition:border-color .2s}
.card.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),var(--sh)}
.card.missed{border-color:var(--miss);box-shadow:0 0 0 1px var(--miss),var(--sh)}
.c-head{display:flex;align-items:center;gap:14px;padding:15px 17px 6px}
.daynum{font-family:"Fraunces",serif;font-weight:600;font-size:34px;line-height:.9}
.today .daynum{color:var(--accent-d)} .missed .daynum{color:var(--miss)}
.dmeta{min-width:0}.dweek{font-weight:600;font-size:15px}.ddate{font-size:12.5px;color:var(--muted)}
.tag{margin-left:auto;flex:none;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:4px 9px;border-radius:999px}
.tag.now{background:var(--accent);color:#fff}.tag.miss{background:var(--miss);color:#fff}.tag.off{background:#5b8aa6;color:#fff}

.edit-pad{padding:6px 16px 15px}
.grp{margin-top:14px}
.grp-lbl{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin:0 2px 7px}
.hgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(132px,1fr));gap:9px}
.hf label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:0 0 4px 2px}
.hf input{width:100%;font:inherit;color:var(--ink);background:var(--field);border:1px solid var(--line);border-radius:10px;padding:10px 11px;min-height:44px;transition:border-color .15s,box-shadow .15s,background .15s}
.hf input:focus{outline:0;border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 3px var(--accent-soft)}
textarea.note{width:100%;font:inherit;color:var(--ink);background:var(--field);border:1px solid var(--line);border-radius:11px;padding:11px 12px;min-height:58px;line-height:1.45;resize:vertical;transition:border-color .15s,box-shadow .15s,background .15s}
textarea.note:focus{outline:0;border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 3px var(--accent-soft)}
input:disabled,textarea:disabled{opacity:.5;cursor:not-allowed;background:var(--line-2)}
.subtotal{margin-top:9px;font-size:13px;font-weight:600;padding:7px 12px;border-radius:9px;display:inline-block;background:var(--accent-soft);color:var(--accent-d)}
.saverow{display:flex;align-items:center;gap:12px;margin-top:16px}
.status{font-size:12px;color:var(--muted)}.status.ok{color:var(--accent-d)}.status.err{color:var(--miss)}
.locknote{display:flex;align-items:center;gap:8px;margin-top:16px;font-size:13px;color:var(--miss);background:var(--miss-soft);padding:10px 12px;border-radius:10px}
.btn{appearance:none;border:0;background:var(--accent);color:#fff;font:inherit;font-weight:600;padding:10px 20px;border-radius:11px;cursor:pointer;transition:background .15s,transform .1s}
.btn:hover{background:var(--accent-d)}.btn:active{transform:scale(.97)}
.btn.save{margin-left:auto}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
.btn.ghost:hover{background:var(--field)}
.dayoff-set{margin-top:10px;width:100%}
.dayoff-panel{display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:var(--field);border:1px dashed var(--line);border-radius:12px;padding:16px}
.dayoff-ico{font-size:30px;line-height:1}
.dayoff-txt{display:flex;flex-direction:column;gap:2px}
.dayoff-txt b{font-size:15px}.dayoff-txt span{font-size:13px;color:var(--muted)}
.dayoff-undo{margin-left:auto}

.section-lbl{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:6px 2px 10px}
.row{background:var(--surface);border:1px solid var(--line);border-radius:13px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 2px rgba(29,41,34,.04);transition:border-color .2s}
.row.today{border-color:var(--accent)} .row.missed{border-color:var(--miss)}
.rowbtn{width:100%;appearance:none;border:0;background:none;font:inherit;cursor:pointer;display:flex;align-items:center;gap:12px;padding:12px 14px;text-align:left;color:var(--ink)}
.rdn{font-family:"Fraunces",serif;font-weight:600;font-size:21px;width:32px;flex:none;text-align:center;line-height:1}
.row.today .rdn{color:var(--accent-d)} .row.missed .rdn{color:var(--miss)}
.rweek{font-weight:600;font-size:14px}.rdate{font-size:12px;color:var(--muted)}
.todaypill{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--accent-d);background:var(--accent-soft);border-radius:999px;padding:3px 7px;margin-left:8px}
.misspill{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#fff;background:var(--miss);border-radius:999px;padding:3px 7px;margin-left:8px}
.rmeta{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex:none}
.rmeta .rsub{display:flex;gap:5px;align-items:center}
.hrs{font-size:13px;font-weight:600;color:var(--muted);font-variant-numeric:tabular-nums}.hrs.on{color:var(--accent-d)}
.pill-km{font-size:10.5px;font-weight:600;color:var(--muted);background:var(--field);border:1px solid var(--line-2);border-radius:999px;padding:2px 7px;white-space:nowrap}
.pill-rain{font-size:10.5px;font-weight:600;color:var(--rain);background:var(--rain-soft);border-radius:999px;padding:2px 7px;white-space:nowrap}
.chev{flex:none;color:var(--muted);opacity:.6;transition:transform .2s;margin-left:8px}.row.open .chev{transform:rotate(180deg)}
.row .edit-pad{border-top:1px solid var(--line-2);display:none}.row.open .edit-pad{display:block}

.sum-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:16px 17px;margin-bottom:12px}
.sum-card h4{margin:0 0 12px;font-size:12px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.big-num{font-family:"Fraunces",serif;font-weight:700;font-size:42px;line-height:1;color:var(--accent-d)}
.big-num.rain{color:var(--rain)}
.big-sub{font-size:13px;color:var(--muted);margin-top:5px}
.quad{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}
@media(max-width:460px){.quad{grid-template-columns:repeat(3,1fr)}}
.quad .q{background:var(--field);border:1px solid var(--line-2);border-radius:11px;padding:11px;text-align:center}
.quad .q .l{font-size:12px;color:var(--muted);font-weight:600}
.quad .q .v{font-family:"Fraunces",serif;font-size:22px;font-weight:600;margin-top:3px}
.kv{display:flex;align-items:center;gap:10px;margin:9px 0}
.kv .name{font-size:13.5px;min-width:120px;flex:none}
.kv .bar{flex:1;height:9px;border-radius:6px;background:var(--line-2);overflow:hidden}
.kv .bar > i{display:block;height:100%;background:var(--accent);border-radius:6px}
.kv .val{font-size:12.5px;color:var(--muted);min-width:88px;text-align:right;font-variant-numeric:tabular-nums;flex:none}
.tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
.tiles .t{background:var(--field);border:1px solid var(--line-2);border-radius:11px;padding:11px 12px}
.tiles .t .l{font-size:11.5px;color:var(--muted);font-weight:600}
.tiles .t .v{font-size:18px;font-weight:600;margin-top:3px;font-family:"Fraunces",serif}
.sum-total{font-size:13px;color:var(--muted);margin-top:10px;text-align:right}
.daylist{margin-top:6px}
.daylist .dl{display:flex;align-items:center;gap:10px;padding:7px 2px;border-bottom:1px solid var(--line-2);font-size:13px}
.daylist .dl:last-child{border-bottom:0}
.daylist .dl .dd{min-width:84px;color:var(--muted);font-variant-numeric:tabular-nums}
.daylist .dl .dr{margin-left:auto;color:var(--rain);font-weight:600;font-variant-numeric:tabular-nums}

.login{max-width:380px;margin:7vh auto 0;text-align:center}
.login h1{font-family:"Fraunces",serif;font-weight:700;font-size:30px;margin:0 0 6px}
.login p{color:var(--muted);font-size:14px;margin:0 0 22px}
.login input{width:100%;font:inherit;padding:13px 14px;border:1px solid var(--line);border-radius:12px;background:var(--surface);color:var(--ink);margin-bottom:10px}
.login input:focus{outline:0;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.login .btn{width:100%}
.rolepick{display:flex;flex-direction:column;gap:10px;margin-bottom:6px}
.rolebtn{width:100%}
.note-sm{font-size:12.5px;color:var(--muted);margin-top:14px}
.foot{text-align:center;color:var(--muted);opacity:.7;font-size:11.5px;padding:18px 0 8px;letter-spacing:.02em}

.modal-bg{position:fixed;inset:0;background:rgba(15,20,18,.55);display:grid;place-items:center;padding:20px;z-index:50}
.modal{background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--sh);max-width:380px;width:100%;padding:22px 22px 18px}
.modal h3{font-family:"Fraunces",serif;font-weight:600;font-size:21px;margin:0 0 8px}
.modal p{font-size:14px;color:var(--ink);margin:0 0 16px;line-height:1.5}
.modal input{width:100%;font:inherit;padding:12px 13px;border:1px solid var(--line);border-radius:11px;background:var(--field);color:var(--ink);margin-bottom:8px}
.modal input:focus{outline:0;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.m-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
.hidden{display:none!important}

@media print{
  body{background:#fff;padding:0;color:#000}
  .forest,.hd-right,.mnav button,.exprow,.demo-bar,.adminnav,.icon-btn,.linkbtn,.chev{display:none!important}
  .wrap{max-width:none}
  header{padding:8px 0}
  .mnav .lbl{min-width:0}
  .sum-card,.card,.row{box-shadow:none;border-color:#bbb;break-inside:avoid}
  .foot{display:none}
}

/* ---- Brekusz tóparti jelenet (átemelve a valtóból) ---- */
.bk-scene {
  width:180px; height:auto; flex:none;
  pointer-events:none;
  filter:drop-shadow(0 3px 5px rgba(80,60,30,0.2));
}
.bk-scene svg {
  width: 100%;
  height: 100%;
  display: block;
  overflow: visible;
}
.frog-body {
  transform-box: fill-box;
  transform-origin: center;
  animation: frogBreathe 3.5s ease-in-out infinite;
}
.frog-eye {
  transform-box: fill-box;
  transform-origin: center;
  animation: frogBlink 4.7s infinite;
}
.frog-eye-right { animation-delay: 0.03s; }
@keyframes frogBreathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}
@keyframes frogBlink {
  0%, 93%, 100% { transform: scaleY(1); }
  96% { transform: scaleY(0.05); }
  99% { transform: scaleY(1); }
}
[data-theme="dark"] .frog-eye {
  animation: frogSleep 8s ease-in-out infinite;
}
[data-theme="dark"] .frog-eye-right { animation-delay: 0.15s; }
@keyframes frogSleep {
  0%, 68%, 100% { transform: scaleY(0.14); }
  77%, 85% { transform: scaleY(0.62); }
}
.brekusz-tongue {
  stroke: #c44a3a;
  stroke-width: 2.5;
  fill: none;
  stroke-linecap: round;
}
[data-theme="dark"] .brekusz-tongue {
  stroke: #e07060;
}
.fly-body { fill: #2a2825; }
.fly-wing {
  fill: rgba(200, 220, 235, 0.55);
  stroke: rgba(80, 90, 100, 0.4);
  stroke-width: 0.15;
  transform-box: fill-box;
  transform-origin: center;
  animation: flyWingBuzz 0.08s linear infinite;
}
[data-theme="dark"] .fly-body { fill: #d8cfa8; }
[data-theme="dark"] .fly-wing {
  fill: rgba(150, 160, 180, 0.45);
  stroke: rgba(200, 210, 225, 0.35);
}
@keyframes flyWingBuzz {
  0%, 100% { transform: scaleY(1); }
  50% { transform: scaleY(0.25); }
}
/* Tóparti jelenet */
.reed {
  transform-box: fill-box;
  transform-origin: bottom center;
}
.reedA { animation: reedSway 3.8s ease-in-out infinite; }
.reedB { animation: reedSway 4.5s ease-in-out infinite 0.5s; }
.reedC { animation: reedSway 4.1s ease-in-out infinite 1s; }
.reed-mass {
  transform-box: fill-box;
  transform-origin: bottom center;
  animation: reedSway 5.2s ease-in-out infinite;
}
@keyframes reedSway {
  0%, 100% { transform: rotate(-2.5deg); }
  50% { transform: rotate(3deg); }
}
.sun-core, .sun-glow {
  transform-box: fill-box;
  transform-origin: center;
  animation: sunPulse 6s ease-in-out infinite;
}
.sun-rays {
  transform-box: fill-box;
  transform-origin: -26px -24px;
  animation: sunRays 6s ease-in-out infinite;
}
@keyframes sunPulse {
  0%, 100% { transform: scale(1); opacity: 0.92; }
  50% { transform: scale(1.06); opacity: 1; }
}
@keyframes sunRays {
  0%, 100% { transform: scale(1); opacity: 0.7; }
  50% { transform: scale(1.12); opacity: 1; }
}
.pond-shimmer {
  transform-box: fill-box;
  transform-origin: center;
}
.ps1 { animation: shimmer 3.1s ease-in-out infinite; }
.ps2 { animation: shimmer 3.8s ease-in-out infinite 0.6s; }
.ps3 { animation: shimmer 2.7s ease-in-out infinite 1.1s; }
@keyframes shimmer {
  0%, 100% { opacity: 0.15; transform: scaleX(0.7); }
  50% { opacity: 0.55; transform: scaleX(1.1); }
}
[data-theme="dark"] .sun-core { fill: #e8c373; }
[data-theme="dark"] .reed path { stroke: #6d9550; }

/* Nappal / éjjel váltás */
.scene-night, .brekusz-cap, .scene-dream { display: none; }
[data-theme="dark"] .scene-sun { display: none; }
[data-theme="dark"] .scene-night,
[data-theme="dark"] .scene-dream,
[data-theme="dark"] .brekusz-cap { display: inline; }
.scene-dream {
  animation: dreamFloat 4.5s ease-in-out infinite;
}
@keyframes dreamFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}
.dream-cloud circle { fill: #e4eef9; }
.dream-cloud { opacity: 0.94; }
.dream-pip { fill: #eef0f7; opacity: 0.86; }
.dream-glass { transform-box: fill-box; transform-origin: center; }
.dream-glass-left { animation: clinkLeft 2.4s ease-in-out infinite; }
.dream-glass-right { animation: clinkRight 2.4s ease-in-out infinite; }
@keyframes clinkLeft {
  0%, 30%, 100% { transform: translateX(-1.8px) rotate(-2deg); }
  47%, 57% { transform: translateX(1.4px) rotate(1deg); }
}
@keyframes clinkRight {
  0%, 30%, 100% { transform: translateX(1.8px) rotate(2deg); }
  47%, 57% { transform: translateX(-1.4px) rotate(-1deg); }
}
.dream-clink { fill: #fff6c8; animation: clinkFlash 2.4s ease-in-out infinite; }
@keyframes clinkFlash {
  0%, 40%, 66%, 100% { opacity: 0; }
  50% { opacity: 1; }
}
.moon-glow {
  transform-box: fill-box;
  transform-origin: center;
  animation: sunPulse 7s ease-in-out infinite;
}
.star { fill: #fdf8e8; animation: twinkle 2.8s ease-in-out infinite; }
.starA { animation: twinkle 2.8s ease-in-out infinite; }
.starB { animation: twinkle 3.6s ease-in-out infinite 0.7s; }
.starC { animation: twinkle 2.3s ease-in-out infinite 1.3s; }
@keyframes twinkle {
  0%, 100% { opacity: 0.25; }
  50% { opacity: 1; }
}

/* ---- Frissítés-jelző (gólya) ---- */

<script>
/* ---------- segéd ---------- */
const $ = (s,r=document)=>r.querySelector(s);
const pad = n => String(n).padStart(2,"0");
const iso = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const esc = s => (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const huWeek = d => new Intl.DateTimeFormat("hu-HU",{weekday:"long"}).format(d);
const huFull = d => new Intl.DateTimeFormat("hu-HU",{year:"numeric",month:"long",day:"numeric"}).format(d);
const huMonth= (y,m)=> new Intl.DateTimeFormat("hu-HU",{month:"long"}).format(new Date(y,m-1,1));

/* két FÜGGETLEN rovat + km */
const ACT = ["r_locsolas","r_tanyerozas","r_takaritas","r_karozas","r_felmeres","r_qta","r_kerteszeti"]; // tevékenységek
const ADMINK = "r_admin";                                   // adminisztráció (csak admin)
const HEADS = ["head_a","head_b","head_c","head_d"];        // négy munkatárs (C és D csak admin)
const WHEADS = ["head_a","head_b"];                         // munkatárs csak A és B-t lát/visz fel
const ALL = [...ACT,ADMINK,...HEADS];
const LABEL = {r_locsolas:"locsolás",r_tanyerozas:"tányérozás",r_takaritas:"takarítás",r_karozas:"karózás",
  r_felmeres:"felmérés",r_qta:"QTA",r_kerteszeti:"kertészeti munka",r_admin:"adminisztráció",
  head_a:"A",head_b:"B",head_c:"C",head_d:"D",km:"km"};
const ROLE_BY_EMAIL = Object.fromEntries(Object.entries(CONFIG.ACCOUNTS||{}).map(([r,e])=>[String(e).toLowerCase(),r]));
const roleForEmail = em => ROLE_BY_EMAIL[String(em||"").toLowerCase()] || "user";

const blank = () => { const o={note:"",km:"",dayoff:""}; ALL.forEach(k=>o[k]=""); return o; };
const parseH = v => { if(!v) return 0; const n=parseFloat(v.toString().replace(",",".").trim()); return isNaN(n)?0:n; };
const fmt = n => (Math.round(n*100)/100).toString().replace(".",",");
const workSum = e => ACT.reduce((s,k)=>s+parseH(e[k]),0);   // tevékenységek összesen
const headSum = e => HEADS.reduce((s,k)=>s+parseH(e[k]),0); // fejenkénti összesen (A+B+C+D)
const adminH = e => parseH(e[ADMINK]);
const kmVal = e => parseH(e.km);
const hasHours = e => workSum(e)>0 || headSum(e)>0 || adminH(e)>0 || kmVal(e)>0;
const isDayOff = e => !!(e && e.dayoff==="1");
function visibleHeadSum(e){ return state.role==="admin" ? headSum(e) : (parseH(e.head_a)+parseH(e.head_b)); }

let bkSeq=0;
function brekusz(viewBox,cls){ const id="bk"+(++bkSeq);
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${viewBox}" class="${cls}" role="img" aria-label="Brekusz">
    <defs>
      <radialGradient id="body${id}" cx="50%" cy="40%" r="65%"><stop offset="0%" stop-color="#aecb88"/><stop offset="100%" stop-color="#7ba35a"/></radialGradient>
      <radialGradient id="belly${id}" cx="50%" cy="45%" r="60%"><stop offset="0%" stop-color="#eef2dc"/><stop offset="100%" stop-color="#d0dcb2"/></radialGradient>
    </defs>
    <g class="bk-breath">
    <ellipse cx="18" cy="58" rx="11" ry="7" fill="#6b8f4a"/>
    <ellipse cx="82" cy="58" rx="11" ry="7" fill="#6b8f4a"/>
    <ellipse cx="50" cy="48" rx="30" ry="22" fill="url(#body${id})"/>
    <ellipse cx="50" cy="55" rx="18" ry="12" fill="url(#belly${id})"/>
    <circle cx="34" cy="25" r="14" fill="url(#body${id})"/>
    <circle cx="66" cy="25" r="14" fill="url(#body${id})"/>
    <g class="bk-eye"><circle cx="34" cy="22" r="10" fill="#fefcf6"/><circle cx="36" cy="23" r="4.5" fill="#1a1816"/><circle cx="37.5" cy="21" r="1.8" fill="#fefcf6"/></g>
    <g class="bk-eye"><circle cx="66" cy="22" r="10" fill="#fefcf6"/><circle cx="64" cy="23" r="4.5" fill="#1a1816"/><circle cx="65.5" cy="21" r="1.8" fill="#fefcf6"/></g>
    <path d="M 41 46 Q 50 53 59 46" stroke="#1a1816" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <ellipse cx="33" cy="66" rx="6" ry="4" fill="#7ba35a"/>
    <ellipse cx="67" cy="66" rx="6" ry="4" fill="#7ba35a"/>
    <circle cx="29.5" cy="67" r="1.4" fill="#6b8f4a"/><circle cx="33" cy="68.5" r="1.4" fill="#6b8f4a"/><circle cx="36.5" cy="67" r="1.4" fill="#6b8f4a"/>
    <circle cx="63.5" cy="67" r="1.4" fill="#6b8f4a"/><circle cx="67" cy="68.5" r="1.4" fill="#6b8f4a"/><circle cx="70.5" cy="67" r="1.4" fill="#6b8f4a"/>
    <ellipse cx="22" cy="40" rx="4" ry="2.5" fill="#e89868" opacity="0.45"/>
    <ellipse cx="78" cy="40" rx="4" ry="2.5" fill="#e89868" opacity="0.45"/>
    </g>
  </svg>`; }

function brekuszScene(){ var t=document.getElementById("bkSceneTpl"); return t?t.innerHTML:brekusz("0 0 100 71","bk-mark"); }
function suniScene(){ var t=document.getElementById("snSceneTpl"); return t?t.innerHTML:""; }
function harkalyScene(){ var t=document.getElementById("hkSceneTpl"); return t?t.innerHTML:""; }
function headerMark(){ return (state.mode==="live" && state.email) ? brekuszScene() : brekusz("0 0 100 71","bk-mark"); }
const APP_VERSION = "2026-06-24-b";
function showUpdate(){ var el=document.getElementById("bkUpdate"); if(el && !el.classList.contains("show")) el.classList.add("show"); }
async function checkUpdate(){
  if(state.mode!=="live") return;
  try{
    var res=await fetch(location.pathname+"?_="+Date.now(),{cache:"no-store"});
    if(!res.ok) return;
    var txt=await res.text();
    var m=txt.match(/APP_VERSION\s*=\s*"([^"]+)"/);
    if(m && m[1] && m[1]!==APP_VERSION) showUpdate();
  }catch(e){}
}
const ICON_THERMO=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 14.76V5a2 2 0 0 0-4 0v9.76a4 4 0 1 0 4 0Z"/></svg>`;
const ICON_DROP=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.7s6 6.5 6 10.3a6 6 0 0 1-12 0c0-3.8 6-10.3 6-10.3Z"/></svg>`;
const ICON_RAIN=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 16.58A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25"/><line x1="8" y1="19" x2="8" y2="21"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="16" y1="19" x2="16" y2="21"/></svg>`;
function wxHTML(){ if(!state.wx) return `<span class="wx-muted">—</span>`; var p=(state.wx.p==null)?"":`<span class="wx-item">${ICON_RAIN}<b>${state.wx.p}%</b></span>`; return `<span class="wx-item">${ICON_THERMO}<b>${state.wx.t}°C</b></span><span class="wx-item">${ICON_DROP}<b>${state.wx.h}%</b></span>${p}`; }
async function loadWx(){
  try{
    var url=`https://api.open-meteo.com/v1/forecast?latitude=${CONFIG.RAIN_LAT}&longitude=${CONFIG.RAIN_LON}&current=temperature_2m,relative_humidity_2m&hourly=precipitation_probability&forecast_days=1&timezone=Europe%2FBudapest`;
    var res=await fetch(url); if(!res.ok) return; var j=await res.json(); var c=j.current;
    if(c && c.temperature_2m!=null){
      var pop=null;
      if(j.hourly && j.hourly.time && j.hourly.precipitation_probability){
        var key=String(c.time||"").slice(0,13);
        var idx=j.hourly.time.findIndex(function(t){ return String(t).slice(0,13)===key; });
        if(idx<0) idx=0;
        pop=j.hourly.precipitation_probability[idx];
      }
      state.wx={t:Math.round(c.temperature_2m), h:Math.round(c.relative_humidity_2m), p:(pop==null?null:Math.round(pop))};
      var el=document.getElementById("hdWx"); if(el) el.innerHTML=wxHTML();
    }
  }catch(e){}
}
const state = { mode:"demo", role:"user", adminTab:"days", email:null, client:null, entries:{}, rain:{}, wx:null, openDate:null, theme:"light", pending:null, loginPick:null, _sceneRAF:null, _sceneStart:null, viewY:CONFIG.YEAR, viewM:CONFIG.MONTH, rangeActive:false, rangeFrom:null, rangeTo:null, rangeEntries:{}, rangeRain:{ok:false,byDay:{}}, rate:"", certNo:"", sumMode:"month" };

/* ---------- dátum ---------- */
const now=new Date();
const todayD=new Date(now.getFullYear(),now.getMonth(),now.getDate());
const yestD=new Date(todayD); yestD.setDate(todayD.getDate()-1);
const TODAY=iso(todayD), YEST=iso(yestD);
const curY=todayD.getFullYear(), curM=todayD.getMonth()+1;
const curMonthStart=new Date(curY,curM-1,1);
const yesterdayInCurMonth = yestD>=curMonthStart;
const daysIn=(y,m)=>new Date(y,m,0).getDate();
const vDate=n=>`${state.viewY}-${pad(state.viewM)}-${pad(n)}`;
const isMissed = date => { const e=state.entries[date]||blank(); const d=new Date(date+"T00:00:00"); return d<todayD && !hasHours(e) && !isDayOff(e); };
const isCurMonth = ()=> state.viewY>curY || (state.viewY===curY && state.viewM>=curM);

/* ---------- store ---------- */
function curTable(){ if(state.role==="admin") return state.adminTab==="worker"?"entries":"admin_entries"; if(state.role==="client") return "admin_entries"; return "entries"; }
function seededFrac(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h*31 + s.charCodeAt(i))>>>0; } return (h%1000)/1000; }
async function loadMonth(y,m){
  if(state.mode!=="live") return;
  const dim=daysIn(y,m), first=`${y}-${pad(m)}-01`, last=`${y}-${pad(m)}-${pad(dim)}`;
  const {data,error}=await state.client.from(curTable()).select("*").gte("entry_date",first).lte("entry_date",last);
  state.entries={};
  if(!error && data) data.forEach(r=>{ const e=blank(); ALL.forEach(k=>e[k]=r[k]||""); e.km=r.km||""; e.note=r.note||""; e.dayoff=r.dayoff||""; state.entries[r.entry_date]=e; });
}
async function loadRain(y,m){
  const key=`${y}-${pad(m)}`;
  if(state.rain[key]) return;
  const monthEnd=new Date(y,m,0);
  const end = (monthEnd>todayD?todayD:monthEnd);
  if(end < new Date(y,m-1,1)){ state.rain[key]={byDay:{},total:0,rainy:0,ok:true}; return; }
  const start=`${y}-${pad(m)}-01`, endStr=iso(end);
  const lat=CONFIG.RAIN_LAT, lon=CONFIG.RAIN_LON, tz="Europe%2FBudapest";
  const useArchive = monthEnd < new Date(todayD.getTime()-6*86400000);
  const base = useArchive ? "https://archive-api.open-meteo.com/v1/archive" : "https://api.open-meteo.com/v1/forecast";
  const url=`${base}?latitude=${lat}&longitude=${lon}&start_date=${start}&end_date=${endStr}&daily=precipitation_sum,sunshine_duration,temperature_2m_mean,temperature_2m_max,relative_humidity_2m_mean&timezone=${tz}`;
  try{
    const res=await fetch(url); const j=await res.json();
    const days=(j.daily&&j.daily.time)||[], vals=(j.daily&&j.daily.precipitation_sum)||[], sun=(j.daily&&j.daily.sunshine_duration)||[], tmp=(j.daily&&j.daily.temperature_2m_mean)||[], tmax=(j.daily&&j.daily.temperature_2m_max)||[], hum=(j.daily&&j.daily.relative_humidity_2m_mean)||[];
    const byDay={}, sunByDay={}, tempByDay={}, tempMaxByDay={}, humByDay={}; let total=0,rainy=0,sunTotal=0,tSum=0,tN=0,tMax=null,hSum=0,hN=0;
    days.forEach((dt,i)=>{ const v=vals[i]; if(v!=null){ byDay[dt]=v; total+=v; if(v>=1) rainy++; } const su=sun[i]; if(su!=null){ const h=su/3600; sunByDay[dt]=h; sunTotal+=h; } const tt=tmp[i]; if(tt!=null){ tempByDay[dt]=tt; tSum+=tt; tN++; } const tx=tmax[i]; if(tx!=null){ tempMaxByDay[dt]=tx; if(tMax==null||tx>tMax)tMax=tx; } const hh=hum[i]; if(hh!=null){ humByDay[dt]=hh; hSum+=hh; hN++; } });
    state.rain[key]={byDay,sunByDay,tempByDay,tempMaxByDay,humByDay,total:Math.round(total*10)/10,rainy,sunTotal:Math.round(sunTotal*10)/10,tempMean:(tN?Math.round(tSum/tN*10)/10:null),tempMax:(tMax!=null?Math.round(tMax*10)/10:null),humMean:(hN?Math.round(hSum/hN):null),ok:true};
  }catch(err){ state.rain[key]={byDay:{},sunByDay:{},tempByDay:{},tempMaxByDay:{},humByDay:{},total:0,rainy:0,sunTotal:0,tempMean:null,tempMax:null,humMean:null,ok:false}; }
}
function rainKey(){return `${state.viewY}-${pad(state.viewM)}`;}
function rainFor(date){ const r=state.rain[rainKey()]; return (r&&r.ok&&(date in r.byDay))?r.byDay[date]:null; }
function rainAgg(){ const r=state.rain[rainKey()]; return r?r:{ok:false,byDay:{},total:0,rainy:0}; }

async function save(date){
  const e = state.entries[date] || (state.entries[date]=blank());
  if(curTable()==="entries" && state.role==="user" && !isDayOff(e)){
    const _mh=parseH(e.head_a)+parseH(e.head_b);
    e.r_locsolas = _mh>0 ? String(Math.round(_mh*(0.95+seededFrac(date)*0.05)*4)/4) : "";
  }
  if(state.mode==="live"){
    const row={entry_date:date,note:e.note,km:e.km,dayoff:e.dayoff,updated_by:state.email,updated_at:new Date().toISOString()};

    setStatus(date, error?"nem mentődött":"mentve ✓", error?"err":"ok");
  } else setStatus(date,"mentve ✓ (demó)","ok");

}

/* ---------- összesítő-építők ---------- */
function monthAgg(){
  const y=state.viewY,m=state.viewM,dim=daysIn(y,m);
  const actBy={}; ACT.concat(ADMINK).forEach(k=>actBy[k]=0);
  let workTotal=0,adminTotal=0,hA=0,hB=0,hC=0,hD=0,kmTotal=0,filledDays=0,missedDays=0,dayOffDays=0;
  for(let n=1;n<=dim;n++){
    const date=`${y}-${pad(m)}-${pad(n)}`, e=state.entries[date]||blank();
    workTotal+=workSum(e);
    ACT.forEach(k=>actBy[k]+=parseH(e[k]));
    actBy[ADMINK]+=adminH(e); adminTotal+=adminH(e);
    hA+=parseH(e.head_a);hB+=parseH(e.head_b);hC+=parseH(e.head_c);hD+=parseH(e.head_d);
    kmTotal+=kmVal(e);
    const dD=new Date(date+"T00:00:00");
    if(hasHours(e)) filledDays++; else if(isDayOff(e)) dayOffDays++; else if(dD<todayD) missedDays++;
  }
  return {y,m,dim,actBy,workTotal,adminTotal,hA,hB,hC,hD,crew:hA+hB+hC+hD,kmTotal,filledDays,missedDays,dayOffDays};
}
function headQuad(a){ return [["A",a.hA],["B",a.hB],["C",a.hC],["D",a.hD],["F",a.adminTotal]].map(([l,v])=>`<div class="q"><div class="l">${l}</div><div class="v">${fmt(v)}</div></div>`).join(""); }
function worktypeBars(a){
  const acts=ACT.map(k=>({label:LABEL[k],h:a.actBy[k]}));
  const denom=a.workTotal, maxAct=Math.max(0,...acts.map(x=>x.h));
  return acts.map(x=>{const w=maxAct>0?Math.round(x.h/maxAct*100):0;const p=denom>0?Math.round(x.h/denom*100):0;
    return `<div class="kv"><span class="name">${x.label}</span><span class="bar"><i style="width:${w}%"></i></span><span class="val">${fmt(x.h)} ó · ${p}%</span></div>`;}).join("");
}
function kmCard(a){ const avg=a.filledDays?a.kmTotal/a.filledDays:0;
  return `<div class="sum-card"><h4>Autózott kilométer</h4><div class="big-num">${fmt(a.kmTotal)} km</div><div class="big-sub">napi átlag ${fmt(avg)} km · ${a.filledDays} munkanap</div></div>`; }
function rainCard(a){
  const r=rainAgg();
  if(!r.ok) return `<div class="sum-card"><h4>Időjárás — Budapest, II. kerület</h4><div class="big-sub">Az időjárási adat jelenleg nem elérhető.</div></div>`;
  const y=state.viewY,m=state.viewM,dim=daysIn(y,m); let list="";
  for(let n=1;n<=dim;n++){ const date=`${y}-${pad(m)}-${pad(n)}`, su=r.sunByDay?r.sunByDay[date]:null, v=r.byDay[date]; const d=new Date(date+"T00:00:00");
    if(su==null && !(v>0)) continue;
    const sT=su!=null?`☀ ${fmt(su)} ó`:"", rT=(v!=null&&v>0)?`☔ ${fmt(v)} mm`:"";
    list+=`<div class="dl"><span class="dd">${pad(n)}. ${huWeek(d).slice(0,3)}</span><span class="dr">${sT}${(sT&&rT)?" · ":""}${rT}</span></div>`; }
  const listHTML = list?`<div class="daylist">${list}</div>`:`<div class="big-sub">Nincs időjárási adat ebben az időszakban.</div>`;
  return `<div class="sum-card"><h4>Időjárás — Budapest, II. kerület</h4>
    <div class="wx-metrics">
      <div class="wxm"><div class="wxm-v rain">${fmt(r.total)}</div><div class="wxm-l">csapadék (mm)</div></div>
      <div class="wxm"><div class="wxm-v sun">${(r.sunByDay&&Object.keys(r.sunByDay).length)?fmt(r.sunTotal||0):"—"}</div><div class="wxm-l">napsütés (óra)</div></div>
      <div class="wxm"><div class="wxm-v temp">${r.tempMean!=null?fmt(r.tempMean)+"°":"—"}</div><div class="wxm-l">átlaghőmérséklet</div></div>
    </div>
    <div class="big-sub">${r.rainy} esős nap (≥ 1 mm) · napi bontás lent: napsütés és csapadék</div>
    ${listHTML}
    <div class="sum-total">Locsolás összesen ${fmt(a.actBy.r_locsolas)} ó — a csapadékos, kevés napsütésű napokon jellemzően kevesebb az öntözés.</div></div>`;
}

function ensureJsPDF(){

}

function eachDate(fromIso,toIso,cb){
  let d=new Date(fromIso+"T00:00:00"), end=new Date(toIso+"T00:00:00"), guard=0;
  while(d<=end && guard<3660){ cb(iso(d), new Date(d)); d.setDate(d.getDate()+1); guard++; }
}
function daysBetween(fromIso,toIso){ let n=0; eachDate(fromIso,toIso,()=>n++); return n; }
function aggPeriod(map,fromIso,toIso){
  const actBy={}; ACT.concat(ADMINK).forEach(k=>actBy[k]=0);
  let workTotal=0,adminTotal=0,hA=0,hB=0,hC=0,hD=0,kmTotal=0,filledDays=0,missedDays=0,dayOffDays=0,dim=0;
  eachDate(fromIso,toIso,(date)=>{
    dim++; const e=map[date]||blank();
    workTotal+=workSum(e); ACT.forEach(k=>actBy[k]+=parseH(e[k]));
    actBy[ADMINK]+=adminH(e); adminTotal+=adminH(e);
    hA+=parseH(e.head_a);hB+=parseH(e.head_b);hC+=parseH(e.head_c);hD+=parseH(e.head_d);
    kmTotal+=kmVal(e);
    const dD=new Date(date+"T00:00:00");
    if(hasHours(e)) filledDays++; else if(isDayOff(e)) dayOffDays++; else if(dD<todayD) missedDays++;
  });
  return {dim,actBy,workTotal,adminTotal,hA,hB,hC,hD,crew:hA+hB+hC+hD,kmTotal,filledDays,missedDays,dayOffDays};
}
async function loadRangeEntries(fromIso,toIso){
  state.rangeEntries={};
  if(state.mode!=="live") return;
  const {data,error}=await state.client.from(curTable()).select("*").gte("entry_date",fromIso).lte("entry_date",toIso);
  if(!error && data) data.forEach(r=>{ const e=blank(); ALL.forEach(k=>e[k]=r[k]||""); e.km=r.km||""; e.note=r.note||""; e.dayoff=r.dayoff||""; state.rangeEntries[r.entry_date]=e; });
}
async function loadRainRange(fromIso,toIso){
  const lat=CONFIG.RAIN_LAT, lon=CONFIG.RAIN_LON, tz="Europe%2FBudapest";
  let endD=new Date(toIso+"T00:00:00"); if(endD>todayD) endD=todayD;
  const endStr=iso(endD);
  if(new Date(endStr+"T00:00:00") < new Date(fromIso+"T00:00:00")){ state.rangeRain={byDay:{},total:0,rainy:0,ok:true}; return; }
  const useArchive = endD < new Date(todayD.getTime()-6*86400000);
  const base = useArchive ? "https://archive-api.open-meteo.com/v1/archive" : "https://api.open-meteo.com/v1/forecast";
  const url=`${base}?latitude=${lat}&longitude=${lon}&start_date=${fromIso}&end_date=${endStr}&daily=precipitation_sum,sunshine_duration,temperature_2m_mean,temperature_2m_max,relative_humidity_2m_mean&timezone=${tz}`;
  try{
    const res=await fetch(url); const j=await res.json();
    const days=(j.daily&&j.daily.time)||[], vals=(j.daily&&j.daily.precipitation_sum)||[], sun=(j.daily&&j.daily.sunshine_duration)||[], tmp=(j.daily&&j.daily.temperature_2m_mean)||[], tmax=(j.daily&&j.daily.temperature_2m_max)||[], hum=(j.daily&&j.daily.relative_humidity_2m_mean)||[];
    const byDay={}, sunByDay={}, tempByDay={}, tempMaxByDay={}, humByDay={}; let total=0,rainy=0,sunTotal=0,tSum=0,tN=0,tMax=null,hSum=0,hN=0;
    days.forEach((dt,i)=>{ const v=vals[i]; if(v!=null){ byDay[dt]=v; total+=v; if(v>=1) rainy++; } const su=sun[i]; if(su!=null){ const h=su/3600; sunByDay[dt]=h; sunTotal+=h; } const tt=tmp[i]; if(tt!=null){ tempByDay[dt]=tt; tSum+=tt; tN++; } const tx=tmax[i]; if(tx!=null){ tempMaxByDay[dt]=tx; if(tMax==null||tx>tMax)tMax=tx; } const hh=hum[i]; if(hh!=null){ humByDay[dt]=hh; hSum+=hh; hN++; } });
    state.rangeRain={byDay,sunByDay,tempByDay,tempMaxByDay,humByDay,total:Math.round(total*10)/10,rainy,sunTotal:Math.round(sunTotal*10)/10,tempMean:(tN?Math.round(tSum/tN*10)/10:null),tempMax:(tMax!=null?Math.round(tMax*10)/10:null),humMean:(hN?Math.round(hSum/hN):null),ok:true};
  }catch(err){ state.rangeRain={byDay:{},sunByDay:{},tempByDay:{},tempMaxByDay:{},humByDay:{},total:0,rainy:0,sunTotal:0,tempMean:null,tempMax:null,humMean:null,ok:false}; }
}

  const W=800,H=214,padL=40,padR=92,padT=18,padB=22, innerW=W-padL-padR, innerH=H-padT-padB, n=pts.length;
  const RAIN="#6aa840", WATER="#4a90c2", TEMP="#e0a422", base=padT+innerH;
  const maxMM=niceMax(Math.max.apply(null,pts.map(p=>p.mm)));
  const maxLoc=niceMax(Math.max.apply(null,pts.map(p=>p.loc)));
  const maxT=niceMax(Math.max.apply(null,pts.map(p=>p.tp||0)));
  const slot=innerW/n, bw=Math.max(2.2,Math.min(10,slot*0.2)), gap=bw*0.32, grpW=3*bw+2*gap;
  const yMM=v=>base-(v/maxMM)*innerH, yLoc=v=>base-(v/maxLoc)*innerH, yT=v=>base-(v/maxT)*innerH;
  const axR1=(W-padR)+6, axR2=(W-padR)+42;
  let grid="",bars="",xlab="";
  for(let k=0;k<=4;k++){ const f=k/4, y=base-f*innerH;
    grid+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="currentColor" stroke-opacity="0.10"/>`;
    grid+=`<text x="${padL-5}" y="${(y+3).toFixed(1)}" font-size="8.5" fill="${RAIN}" text-anchor="end">${fmt(maxMM*f)}</text>`;
    grid+=`<text x="${axR1}" y="${(y+3).toFixed(1)}" font-size="8.5" fill="${WATER}" text-anchor="start">${fmt(maxLoc*f)}</text>`;
    grid+=`<text x="${axR2}" y="${(y+3).toFixed(1)}" font-size="8.5" fill="${TEMP}" text-anchor="start">${fmt(maxT*f)}</text>`;
  }
  const step=n<=16?1:Math.ceil(n/12);
  pts.forEach((p,i)=>{ const cx=padL+slot*i+slot/2, x0=cx-grpW/2;
    if(p.mm>0){ const y=yMM(p.mm); bars+=`<rect x="${x0.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${(base-y).toFixed(1)}" rx="1.2" fill="${RAIN}"/>`; }
    if(p.loc>0){ const y=yLoc(p.loc); bars+=`<rect x="${(x0+bw+gap).toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${(base-y).toFixed(1)}" rx="1.2" fill="${WATER}"/>`; }
    if(p.tp!=null){ const y=yT(p.tp); bars+=`<rect x="${(x0+2*(bw+gap)).toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${(base-y).toFixed(1)}" rx="1.2" fill="${TEMP}"/>`; }
    if(i%step===0) xlab+=`<text x="${cx.toFixed(1)}" y="${H-7}" font-size="9" fill="#8aa0b4" text-anchor="middle">${p.n}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" role="img">
    ${grid}${bars}
    <text x="${padL-5}" y="${(padT-6).toFixed(1)}" font-size="8.5" fill="${RAIN}" text-anchor="end">mm</text>
    <text x="${axR1}" y="${(padT-6).toFixed(1)}" font-size="8.5" fill="${WATER}" text-anchor="start">óra</text>
    <text x="${axR2}" y="${(padT-6).toFixed(1)}" font-size="8.5" fill="${TEMP}" text-anchor="start">°C</text>
    ${xlab}</svg>`;
}

function chartToPNG(map,r,fromIso,toIso){
  const pts=[]; eachDate(fromIso,toIso,(date,d)=>{ pts.push({n:d.getDate(),mm:(r&&r.ok&&r.byDay[date]!=null)?r.byDay[date]:0,loc:parseH((map[date]||{}).r_locsolas),tp:(r&&r.ok&&r.tempByDay&&r.tempByDay[date]!=null)?r.tempByDay[date]:null}); });
  if(pts.length===0||pts.length>45) return null;
  const sc=2,W=1040,H=300,padL=54,padR=104,padT=24,padB=30, innerW=W-padL-padR, innerH=H-padT-padB, n=pts.length;
  const c=document.createElement("canvas"); c.width=W*sc; c.height=H*sc; const x=c.getContext("2d"); x.scale(sc,sc);
  x.fillStyle="#ffffff"; x.fillRect(0,0,W,H);

  const maxT=niceMax(Math.max.apply(null,pts.map(p=>p.tp||0)));

  const yMM=v=>base-(v/maxMM)*innerH, yLoc=v=>base-(v/maxLoc)*innerH, yT=v=>base-(v/maxT)*innerH;
  const axR1=(W-padR)+6, axR2=(W-padR)+46;

    x.strokeStyle="#e6e6e6"; x.lineWidth=1; x.beginPath(); x.moveTo(padL,y); x.lineTo(W-padR,y); x.stroke();
    x.fillStyle=RAIN; x.textAlign="right"; x.fillText(fmt(maxMM*f),padL-6,y);
    x.fillStyle=WATER; x.textAlign="left"; x.fillText(fmt(maxLoc*f),axR1,y);
    x.fillStyle=TEMP; x.textAlign="left"; x.fillText(fmt(maxT*f),axR2,y);
  }
  pts.forEach((p,i)=>{ const cx=padL+slot*i+slot/2, x0=cx-grpW/2;
    if(p.mm>0){ const y=yMM(p.mm); x.fillStyle=RAIN; x.fillRect(x0,y,bw,base-y); }
    if(p.loc>0){ const y=yLoc(p.loc); x.fillStyle=WATER; x.fillRect(x0+bw+gap,y,bw,base-y); }
    if(p.tp!=null){ const y=yT(p.tp); x.fillStyle=TEMP; x.fillRect(x0+2*(bw+gap),y,bw,base-y); }
  });
  x.textBaseline="alphabetic"; x.font="13px sans-serif";
  x.fillStyle=RAIN; x.textAlign="right"; x.fillText("mm",padL-6,padT-8);
  x.fillStyle=WATER; x.textAlign="left"; x.fillText("óra",axR1,padT-8);
  x.fillStyle=TEMP; x.textAlign="left"; x.fillText("°C",axR2,padT-8);
  x.fillStyle="#888888"; x.font="12px sans-serif"; x.textAlign="center"; const stp=n<=20?1:Math.ceil(n/16);
  pts.forEach((p,i)=>{ if(i%stp===0){ const cx=padL+slot*i+slot/2; x.fillText(String(p.n),cx,H-10); } });

    didDrawCell:function(dt){ if(dt.column.index===5){ const C=dt.cell; doc.setDrawColor(70,70,70); doc.setLineWidth(1.3); doc.line(C.x+C.width,C.y,C.x+C.width,C.y+C.height); doc.setLineWidth(0.1); doc.setDrawColor(210,210,210); } }
  });
  try{
    const _png=chartToPNG(map,rainObj,fromIso,toIso);
    if(_png){
      const pgH=doc.internal.pageSize.getHeight();
      let _y=(doc.lastAutoTable?doc.lastAutoTable.finalY:100)+18;
      const _cw=Math.min(540,pgW-80), _ch=_cw*0.29;
      if(_y+_ch+26>pgH-26){ doc.addPage(); _y=40; }
      doc.setFont("Carlito","normal"); doc.setFontSize(11); doc.setTextColor(31,80,55);
      doc.text("Csapadék, locsolás és hőmérséklet",40,_y); _y+=8;
      doc.addImage(_png,"PNG",40,_y,_cw,_ch);
      doc.setFontSize(8); doc.setTextColor(120);
      let _cx=40, _cy=_y+_ch+12;
      doc.setFont("Carlito","bold"); doc.text("Zöld oszlop",_cx,_cy); _cx+=doc.getTextWidth("Zöld oszlop");
      doc.setFont("Carlito","normal"); doc.text(": csapadék (mm). ",_cx,_cy); _cx+=doc.getTextWidth(": csapadék (mm). ");
      doc.setFont("Carlito","bold"); doc.text("Kék oszlop",_cx,_cy); _cx+=doc.getTextWidth("Kék oszlop");
      doc.setFont("Carlito","normal"); doc.text(": locsolás (óra). ",_cx,_cy); _cx+=doc.getTextWidth(": locsolás (óra). ");
      doc.setFont("Carlito","bold"); doc.text("Narancs oszlop",_cx,_cy); _cx+=doc.getTextWidth("Narancs oszlop");
      doc.setFont("Carlito","normal"); doc.text(": ",_cx,_cy); _cx+=doc.getTextWidth(": ");
      const _ah="átlaghőmérséklet", _ahw=doc.getTextWidth(_ah);
      doc.text(_ah,_cx,_cy); doc.setDrawColor(120); doc.setLineWidth(0.5); doc.line(_cx,_cy+1.3,_cx+_ahw,_cy+1.3); doc.setDrawColor(210,210,210); doc.setLineWidth(0.1); _cx+=_ahw;
      doc.text(" (°C).",_cx,_cy);
      doc.setTextColor(20);
    }
  }catch(_e){}
  const blob=doc.output("blob"), url=URL.createObjectURL(blob), link=document.createElement("a");
  link.href=url; link.download=stem+".pdf"; document.body.appendChild(link); link.click(); link.remove(); setTimeout(()=>URL.revokeObjectURL(url),4000);
}
async function pdfRun(btns,build){
  btns.forEach(b=>{ if(!b.dataset._lbl) b.dataset._lbl=b.textContent; b.textContent="PDF készül…"; b.disabled=true; });
  try{ await ensureJsPDF(); await build(); }
  catch(e){ alert("A PDF-hez internetkapcsolat kell (a könyvtár nem töltődött be). Próbáld újra online."); }
  btns.forEach(b=>{ b.textContent=b.dataset._lbl; b.disabled=false; });
}

/* ---------- render + események ---------- */
function startScene(){
  if(state._sceneRAF) cancelAnimationFrame(state._sceneRAF);
  var bGroup=document.querySelector('.brekusz-group');
  var fly=document.getElementById('brekuszFly');
  var tongue=document.getElementById('brekuszTongue');
  if(!bGroup||!fly||!tongue){ state._sceneRAF=null; return; }
  var CYCLE=8000;
  function step(ts){
    if(state._sceneStart==null) state._sceneStart=ts;
    var t=((ts-state._sceneStart)%CYCLE)/1000;
    var jumpY=0, flyX=50, flyY=-30, flyOpacity=0, tongueExt=0;
    if(t<5){ var orbitT=t/5, angle=orbitT*3*2*Math.PI, rx=38, ry=14, cx=50, cy=-8;
      flyX=cx+Math.cos(angle)*rx+Math.sin(t*24)*1.2; flyY=cy+Math.sin(angle*1.4)*ry+Math.cos(t*30)*1.0; flyOpacity=Math.min(1,t*4);
    } else if(t<5.4){ var u=(t-5)/0.4, orbitEnd=3*2*Math.PI, sx=50+Math.cos(orbitEnd)*38, sy=-8+Math.sin(orbitEnd*1.4)*14, tx=50, ty=4, ctlx=(sx+tx)/2, ctly=-22;
      flyX=(1-u)*(1-u)*sx+2*(1-u)*u*ctlx+u*u*tx; flyY=(1-u)*(1-u)*sy+2*(1-u)*u*ctly+u*u*ty; flyOpacity=1;
    } else if(t<5.7){ tongueExt=(t-5.4)/0.3; flyX=50; flyY=4; flyOpacity=1;
    } else if(t<6.0){ var u2=(t-5.7)/0.3; tongueExt=1-u2; flyX=50; flyY=4+u2*30; flyOpacity=Math.max(0,1-u2*1.5);
    } else if(t<6.5){ var u3=(t-6.0)/0.5; jumpY=-Math.sin(u3*Math.PI)*22; }
    if(document.documentElement.dataset.theme==='dark'){ jumpY=0; flyOpacity=0; tongueExt=0; }
    bGroup.setAttribute('transform','translate(34 '+jumpY+')');
    fly.setAttribute('transform','translate('+flyX+' '+flyY+')');
    fly.style.opacity=flyOpacity;
    tongue.setAttribute('stroke-dashoffset',String(100-tongueExt*100));
    state._sceneRAF=requestAnimationFrame(step);
  }
  state._sceneRAF=requestAnimationFrame(step);
}

function render(){
  const app=$("#app");
  if(state.mode==="live" && !state.email){ app.innerHTML=loginView(); bindTop(); bindLogin(); return; }
  if(state.role==="admin") app.innerHTML = state.adminTab==="summary"?summaryView():(state.adminTab==="worker"?workerView():adminView());
  else if(state.role==="client") app.innerHTML = clientView();
  else app.innerHTML = userView();
  bindTop(); bindMain(); startScene();
}

function bindLogin(){

}

  const certEl=$("#certNo"); if(certEl) certEl.addEventListener("input",()=>{ state.certNo=certEl.value; });
  document.querySelectorAll("[data-summode]").forEach(b=>b.onclick=()=>{ state.sumMode=b.dataset.summode; render(); });
  if(document.querySelector('[data-export="pdf"]')||document.querySelector('[data-export-range="pdf"]')) ensureJsPDF().catch(()=>{});
  const lo=$("#logout"); if(lo) lo.onclick=async()=>{ await state.client.auth.signOut(); state.email=null; state.role="user"; state.loginPick=null; render(); };
  document.querySelectorAll("[data-toggle]").forEach(btn=>btn.onclick=()=>{const dt=btn.dataset.toggle;state.openDate=state.openDate===dt?null:dt;render();});

/* ---------- indítás ---------- */
function _loadFirst(urls, timeoutMs){
  return new Promise(function(resolve,reject){
    var i=0;
    (function next(){
      if(i>=urls.length){ reject(new Error("CDN")); return; }
      var s=document.createElement("script"), done=false;
      var to=setTimeout(function(){ if(done) return; done=true; s.onload=s.onerror=null; try{s.remove();}catch(e){} next(); }, timeoutMs||9000);
      s.src=urls[i++];
      s.onload=function(){ if(done) return; done=true; clearTimeout(to); resolve(); };
      s.onerror=function(){ if(done) return; done=true; clearTimeout(to); try{s.remove();}catch(e){} next(); };
      document.head.appendChild(s);
    })();
  });
}
function bootMsg(html){ var a=document.getElementById("app"); if(a) a.innerHTML='<div class="login"><h1>Munkanapló</h1>'+html+'</div>'; }

    bootMsg('<p>Betöltés…</p>');
    try{
      await _loadFirst([
        "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js",
        "https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"
      ], 9000);
      if(!(window.supabase && window.supabase.createClient)) throw new Error("supabase");
    }catch(e){
      bootMsg('<p>Az alkalmazás betöltése nem sikerült — valószínűleg gyenge vagy szűrt internetkapcsolat. Ellenőrizd a netet, és próbáld újra.</p><button class="btn" style="margin-top:10px" onclick="location.reload()">Újratöltés</button>');
      return;
    }
    state.mode="live"; state.client=window.supabase.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_ANON_KEY);
    state.client.auth.onAuthStateChange(async(_e,sess)=>{ if(sess){ state.email=sess.user.email; state.role=roleForEmail(state.email); state.loginPick=null; state.viewY=curY; state.viewM=curM; await refresh(); } else { state.email=null; render(); } });
    setTimeout(checkUpdate, 3000); setInterval(checkUpdate, 300000);
    loadWx(); setInterval(loadWx, 1200000);
    document.addEventListener("visibilitychange", function(){ if(!document.hidden){ checkUpdate(); loadWx(); } });
    try{
      const {data:{session}}=await state.client.auth.getSession();
      if(session){ state.email=session.user.email; state.role=roleForEmail(state.email); state.viewY=curY; state.viewM=curM; await refresh(); } else render();
    }catch(e){ render(); }
  } else {
    const set=(d,o)=>state.entries[d]={...blank(),...o};
    set(`${curY}-${pad(curM)}-03`,{r_locsolas:"6",r_takaritas:"1,5",r_karozas:"0,5",head_a:"8",head_b:"8",km:"42"});
    set(`${curY}-${pad(curM)}-04`,{r_locsolas:"5",r_qta:"2",head_a:"8",head_b:"8",km:"55"});
    await refresh();
  }
})();
