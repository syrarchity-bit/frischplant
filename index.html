<script>
/* ---------- segéd ---------- */
const $ = (s,r=document)=>r.querySelector(s);
const pad = n => String(n).padStart(2,"0");
const iso = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const esc = s => (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const huWeek = d => new Intl.DateTimeFormat("hu-HU",{weekday:"long"}).format(d);
const huFull = d => new Intl.DateTimeFormat("hu-HU",{year:"numeric",month:"long",day:"numeric"}).format(d);
const huMonth= (y,m)=> new Intl.DateTimeFormat("hu-HU",{month:"long"}).format(new Date(y,m-1,1));

/* két FÜGGETLEN rovat */
const ACT = ["r_locsolas","r_tanyerozas","r_takaritas","r_karozas","r_felmeres","r_qta","r_kerteszeti"]; // tevékenységek
const ADMINK = "r_admin";                                   // adminisztráció (csak admin)
const HEADS = ["head_a","head_b","head_c","head_d"];        // négy önálló munkatárs, függetlenül kitölthető (A is)
const ALL = [...ACT,ADMINK,...HEADS];
const LABEL = {r_locsolas:"locsolás",r_tanyerozas:"tányérozás",r_takaritas:"takarítás",r_karozas:"karózás",
  r_felmeres:"felmérés",r_qta:"QTA",r_kerteszeti:"kertészeti munka",r_admin:"adminisztráció",
  head_a:"A",head_b:"B",head_c:"C",head_d:"D"};
const EFF_PASS = CONFIG.ADMIN_PASS || "admin";

const blank = () => { const o={note:""}; ALL.forEach(k=>o[k]=""); return o; };
const parseH = v => { if(!v) return 0; const n=parseFloat(v.toString().replace(",",".").trim()); return isNaN(n)?0:n; };
const fmt = n => (Math.round(n*100)/100).toString().replace(".",",");
const workSum = e => ACT.reduce((s,k)=>s+parseH(e[k]),0);   // tevékenységek összesen
const headSum = e => HEADS.reduce((s,k)=>s+parseH(e[k]),0); // fejenkénti összesen (A+B+C+D)
const adminH = e => parseH(e[ADMINK]);
const hasHours = e => workSum(e)>0 || headSum(e)>0 || adminH(e)>0;

let bkSeq=0;
function brekusz(viewBox,cls){ const id="bk"+(++bkSeq);
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${viewBox}" class="${cls}" role="img" aria-label="Brekusz">
    <defs>
      <radialGradient id="body${id}" cx="50%" cy="40%" r="65%"><stop offset="0%" stop-color="#aecb88"/><stop offset="100%" stop-color="#7ba35a"/></radialGradient>
      <radialGradient id="belly${id}" cx="50%" cy="45%" r="60%"><stop offset="0%" stop-color="#eef2dc"/><stop offset="100%" stop-color="#d0dcb2"/></radialGradient>
    </defs>
    <g class="bk-breath">
    <ellipse cx="18" cy="58" rx="11" ry="7" fill="#6b8f4a"/>
    <ellipse cx="82" cy="58" rx="11" ry="7" fill="#6b8f4a"/>
    <ellipse cx="50" cy="48" rx="30" ry="22" fill="url(#body${id})"/>
    <ellipse cx="50" cy="55" rx="18" ry="12" fill="url(#belly${id})"/>
    <circle cx="34" cy="25" r="14" fill="url(#body${id})"/>
    <circle cx="66" cy="25" r="14" fill="url(#body${id})"/>
    <g class="bk-eye"><circle cx="34" cy="22" r="10" fill="#fefcf6"/><circle cx="36" cy="23" r="4.5" fill="#1a1816"/><circle cx="37.5" cy="21" r="1.8" fill="#fefcf6"/></g>
    <g class="bk-eye"><circle cx="66" cy="22" r="10" fill="#fefcf6"/><circle cx="64" cy="23" r="4.5" fill="#1a1816"/><circle cx="65.5" cy="21" r="1.8" fill="#fefcf6"/></g>
    <path d="M 41 46 Q 50 53 59 46" stroke="#1a1816" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <ellipse cx="33" cy="66" rx="6" ry="4" fill="#7ba35a"/>
    <ellipse cx="67" cy="66" rx="6" ry="4" fill="#7ba35a"/>
    <circle cx="29.5" cy="67" r="1.4" fill="#6b8f4a"/><circle cx="33" cy="68.5" r="1.4" fill="#6b8f4a"/><circle cx="36.5" cy="67" r="1.4" fill="#6b8f4a"/>
    <circle cx="63.5" cy="67" r="1.4" fill="#6b8f4a"/><circle cx="67" cy="68.5" r="1.4" fill="#6b8f4a"/><circle cx="70.5" cy="67" r="1.4" fill="#6b8f4a"/>
    <ellipse cx="22" cy="40" rx="4" ry="2.5" fill="#e89868" opacity="0.45"/>
    <ellipse cx="78" cy="40" rx="4" ry="2.5" fill="#e89868" opacity="0.45"/>
    </g>
  </svg>`; }

const state = { mode:"demo", role:"user", adminTab:"days", email:null, client:null, entries:{}, openDate:null, theme:"light", pending:null };

/* ---------- dátum ---------- */
const Y=CONFIG.YEAR, M=CONFIG.MONTH;
const monthStart=new Date(Y,M-1,1), daysInMonth=new Date(Y,M,0).getDate();
const now=new Date();
const todayD=new Date(now.getFullYear(),now.getMonth(),now.getDate());
const yestD=new Date(todayD); yestD.setDate(todayD.getDate()-1);
const TODAY=iso(todayD), YEST=iso(yestD);
const yesterdayInMonth = yestD>=monthStart;
const isMissed = date => { const d=new Date(date+"T00:00:00"); return d<todayD && !hasHours(state.entries[date]||blank()); };

/* ---------- store ---------- */
async function loadAll(){
  if(state.mode!=="live") return;
  const first=`${Y}-${pad(M)}-01`, last=`${Y}-${pad(M)}-${pad(daysInMonth)}`;
  const {data,error}=await state.client.from("entries").select("*").gte("entry_date",first).lte("entry_date",last);
  state.entries={};
  if(!error && data) data.forEach(r=>{ const e=blank(); ALL.forEach(k=>e[k]=r[k]||""); e.note=r.note||""; state.entries[r.entry_date]=e; });
}
async function save(date){
  const e = state.entries[date] || (state.entries[date]=blank());
  if(state.mode==="live"){
    const row={entry_date:date,note:e.note,updated_by:state.email,updated_at:new Date().toISOString()};
    ALL.forEach(k=>row[k]=e[k]);
    const {error}=await state.client.from("entries").upsert(row,{onConflict:"entry_date"});
    setStatus(date, error?"nem mentődött":"mentve ✓", error?"err":"ok");
  } else setStatus(date,"mentve ✓ (demó)","ok");
  render();
}
function setStatus(date,txt,cls){document.querySelectorAll(`[data-status="${date}"]`).forEach(el=>{el.textContent=txt;el.className="status "+(cls||"");});}

/* ---------- mezők ---------- */
function hf(date,k,dis){const e=state.entries[date]||blank();
  return `<div class="hf"><label>${LABEL[k]}</label><input type="text" inputmode="decimal" autocomplete="off" data-date="${date}" data-field="${k}" value="${esc(e[k])}" placeholder="0"${dis||""}></div>`;}
function editorHTML(date,locked){
  const e=state.entries[date]||blank(); const dis = locked?" disabled":"";
  const adminBlock = (!locked && state.role==="admin")
    ? `<div class="grp"><div class="grp-lbl">Adminisztráció (csak admin)</div><div class="hgrid">${hf(date,ADMINK,dis)}</div></div>` : "";
  const tail = locked
    ? `<div class="locknote">🔒 Előbb töltsd ki és mentsd a tegnapi napot.</div>`
    : `<div class="saverow"><span class="status" data-status="${date}"></span><button class="btn save" data-save="${date}">Mentés</button></div>`;
  return `
    <div class="grp"><div class="grp-lbl">Óraszám tevékenységenként</div><div class="hgrid">${ACT.map(k=>hf(date,k,dis)).join("")}</div>
      <div class="subtotal" data-acttotal="${date}">Tevékenységek összesen: ${fmt(workSum(e))} óra</div></div>
    <div class="grp"><div class="grp-lbl">Fejenkénti munkaóra</div><div class="hgrid">${HEADS.map(k=>hf(date,k,dis)).join("")}</div>
      <div class="subtotal" data-headtotal="${date}">Fejenkénti összesen: ${fmt(headSum(e))} óra</div></div>
    ${adminBlock}
    <div class="grp"><div class="grp-lbl">Megjegyzés</div><textarea class="note" data-date="${date}" data-field="note" rows="2"${dis}>${esc(e.note)}</textarea></div>
    ${tail}`;
}

/* ---------- fejléc + sávok ---------- */
function headerHTML(){
  const themeBtn=`<button class="icon-btn" id="theme" title="téma">${state.theme==="dark"?ICON_SUN:ICON_MOON}</button>`;
  let info;
  if(state.mode==="live"){
    info = state.role==="admin"
      ? `<div class="who">${esc(state.email||"")}<br><span class="badge">adminisztrátor</span><br><button class="linkbtn" id="exitadmin">vissza munkatárs nézethez</button><br><button class="linkbtn" id="logout">kijelentkezés</button></div>`
      : `<div class="who">${esc(state.email||"")}<br><span class="badge">munkatárs</span><br><button class="linkbtn" id="goadmin">admin belépés →</button><br><button class="linkbtn" id="logout">kijelentkezés</button></div>`;
  } else info = `<div class="who"><span class="badge">demó mód</span></div>`;
  return `<header><div class="brand"><div class="wm"><div class="title-h">FRISCHPLANT</div><div class="sub">${Y} · ${huMonth(Y,M)}</div></div>${brekusz("0 0 100 71","bk-mark")}</div>
    <div class="hd-right">${themeBtn}${info}</div></header>`;
}
function demoBar(){ if(state.mode==="live") return "";
  return `<div class="demo-bar">Kipróbálási mód, az adat nem mentődik.
    <span class="toggle"><button data-role="user" aria-pressed="${state.role==='user'}">munkatárs</button><button data-role="admin" aria-pressed="${state.role==='admin'}">admin 🔒</button></span></div>`;}
function adminNav(active){
  return `<div class="adminnav"><span class="toggle">
    <button data-tab="days" aria-pressed="${active==='days'}">Napok</button>
    <button data-tab="summary" aria-pressed="${active==='summary'}">Összesítés</button></span></div>`;}

const ICON_MOON=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>`;
const ICON_SUN=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.4 1.4M17.6 17.6 19 19M19 5l-1.4 1.4M6.4 17.6 5 19"/></svg>`;

/* ---------- nézetek ---------- */
function dayCard(date,kind,locked){
  const d=new Date(date+"T00:00:00");
  const tag = kind==="now"?`<span class="tag now">ma</span>`:`<span class="tag miss">elmaradt</span>`;
  return `<div class="card ${kind==='now'?'today':'missed'}"><div class="c-head"><div class="daynum">${d.getDate()}</div>
      <div class="dmeta"><div class="dweek">${huWeek(d)}</div><div class="ddate">${huFull(d)}</div></div>${tag}</div>
    <div class="edit-pad">${editorHTML(date,locked)}</div></div>`;
}
function userView(){
  let h=headerHTML()+demoBar();
  const yMissing = yesterdayInMonth && !hasHours(state.entries[YEST]||blank());
  if(yMissing){ h+=dayCard(YEST,"prev",false); h+=dayCard(TODAY,"now",true); }
  else h+=dayCard(TODAY,"now",false);
  h+=`<div class="foot">FRISCHPLANT · ${huMonth(Y,M)} próbahónap</div>`;
  return h;
}
function adminRow(n){
  const date=`${Y}-${pad(M)}-${pad(n)}`, d=new Date(date+"T00:00:00");
  const e=state.entries[date]||blank(), tot=(headSum(e)>0?headSum(e):workSum(e)), open=state.openDate===date;
  const today=date===TODAY, missed=isMissed(date);
  const pill = today?'<span class="todaypill">ma</span>':(missed?'<span class="misspill">elmaradt</span>':'');
  return `<div class="row ${open?'open':''} ${today?'today':''} ${missed?'missed':''}" data-row="${date}">
    <button class="rowbtn" data-toggle="${date}"><span class="rdn">${n}</span>
      <span class="dmeta"><span class="rweek">${huWeek(d)}</span>${pill}<br><span class="rdate">${huFull(d)}</span></span>
      <span class="hrs ${tot>0?'on':''}">${tot>0?fmt(tot)+' ó':'—'}</span>
      <svg class="chev" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button><div class="edit-pad">${open?editorHTML(date,false):""}</div></div>`;
}
function adminView(){
  let rows=""; for(let n=1;n<=daysInMonth;n++) rows+=adminRow(n);
  return headerHTML()+demoBar()+adminNav('days')+`<div class="section-lbl">teljes hónap · ${daysInMonth} nap</div>`+rows+`<div class="foot">FRISCHPLANT · adminisztrátori nézet</div>`;
}
function monthAgg(){
  const actBy={}; ACT.concat(ADMINK).forEach(k=>actBy[k]=0);
  let workTotal=0, adminTotal=0, hA=0,hB=0,hC=0,hD=0, filledDays=0, missedDays=0;
  for(let n=1;n<=daysInMonth;n++){
    const date=`${Y}-${pad(M)}-${pad(n)}`, e=state.entries[date]||blank();
    workTotal+=workSum(e);
    ACT.forEach(k=>actBy[k]+=parseH(e[k]));
    actBy[ADMINK]+=adminH(e); adminTotal+=adminH(e);
    hA+=parseH(e.head_a); hB+=parseH(e.head_b); hC+=parseH(e.head_c); hD+=parseH(e.head_d);
    const dD=new Date(date+"T00:00:00");
    if(hasHours(e)) filledDays++; else if(dD<todayD) missedDays++;
  }
  const crew=hA+hB+hC+hD;
  return {actBy,workTotal,adminTotal,hA,hB,hC,hD,crew,filledDays,missedDays};
}
function summaryView(){
  const a=monthAgg();
  const acts=ACT.concat(ADMINK).map(k=>({label:LABEL[k],h:a.actBy[k]}));
  const denom=a.workTotal+a.adminTotal, maxAct=Math.max(0,...acts.map(x=>x.h));
  const topAct=ACT.map(k=>({label:LABEL[k],h:a.actBy[k]})).reduce((p,c)=>c.h>p.h?c:p,{h:0,label:'—'});
  const avg=a.filledDays?a.crew/a.filledDays:0;
  const heads=[["A",a.hA],["B",a.hB],["C",a.hC],["D",a.hD]].map(([l,v])=>`<div class="q"><div class="l">${l}</div><div class="v">${fmt(v)}</div></div>`).join("");
  const bars=acts.map(x=>{const w=maxAct>0?Math.round(x.h/maxAct*100):0;const p=denom>0?Math.round(x.h/denom*100):0;
    return `<div class="kv"><span class="name">${x.label}</span><span class="bar"><i style="width:${w}%"></i></span><span class="val">${fmt(x.h)} ó · ${p}%</span></div>`;}).join("");
  return headerHTML()+demoBar()+adminNav('summary')+
    `<div class="sum-card"><h4>Fejenkénti munkaóra (havi) — A–D</h4><div class="quad">${heads}</div><div class="sum-total">A–D összesen ${fmt(a.crew)} óra</div></div>
     <div class="sum-card"><h4>Tevékenység szerinti összóraszám</h4>${bars}<div class="sum-total">összesen ${fmt(denom)} óra</div></div>
     <div class="sum-card"><h4>Statisztika</h4><div class="tiles">
       <div class="t"><div class="l">Kitöltött napok</div><div class="v">${a.filledDays} / ${daysInMonth}</div></div>
       <div class="t"><div class="l">Elmaradt napok</div><div class="v">${a.missedDays}</div></div>
       <div class="t"><div class="l">Fejenkénti összes (A–D)</div><div class="v">${fmt(a.crew)} ó</div></div>
       <div class="t"><div class="l">Tevékenységek összesen</div><div class="v">${fmt(a.workTotal)} ó</div></div>
       <div class="t"><div class="l">Átlag fejenkénti / nap</div><div class="v">${fmt(avg)} ó</div></div>
       <div class="t"><div class="l">Legtöbb idő (tev.)</div><div class="v" style="font-size:15px">${topAct.h>0?topAct.label:'—'}</div></div>
       <div class="t"><div class="l">Adminisztráció</div><div class="v">${fmt(a.adminTotal)} ó</div></div>
     </div></div>
     <div class="foot">FRISCHPLANT · havi összesítő, csak admin</div>`;
}
function loginView(){
  return headerHTML()+`<div class="login">${brekusz("0 0 100 80","bk-hero")}<h1>FRISCHPLANT</h1>
    <p>Lépj be a jelszóval.</p>
    <input id="pw" type="password" autocomplete="current-password" placeholder="jelszó">
    <button class="btn" id="signin">Belépés</button>
    <div class="note-sm" id="loginmsg"></div></div>`;
}

/* ---------- render + események ---------- */
function render(){
  const app=$("#app");
  if(state.mode==="live" && !state.email){ app.innerHTML=loginView(); bindTop(); bindLogin(); return; }
  app.innerHTML = state.role==="admin" ? (state.adminTab==="summary"?summaryView():adminView()) : userView();
  bindTop(); bindMain();
}
function bindTop(){const t=$("#theme"); if(t) t.onclick=()=>{state.theme=state.theme==="dark"?"light":"dark";
  document.documentElement.setAttribute("data-theme",state.theme); t.innerHTML=state.theme==="dark"?ICON_SUN:ICON_MOON;};}
function bindLogin(){const go=async()=>{const pw=$("#pw").value;
    if(!pw){$("#loginmsg").textContent="Add meg a jelszót.";return;}
    $("#loginmsg").textContent="Belépés…";
    const {error}=await state.client.auth.signInWithPassword({email:CONFIG.LOGIN_EMAIL,password:pw});
    if(error) $("#loginmsg").textContent="Hibás jelszó.";};
  $("#signin").onclick=go; $("#pw").addEventListener("keydown",e=>{if(e.key==="Enter") go();});}
function updateTotals(date){const e=state.entries[date]||blank();
  document.querySelectorAll(`[data-acttotal="${date}"]`).forEach(el=>el.textContent=`Tevékenységek összesen: ${fmt(workSum(e))} óra`);
  document.querySelectorAll(`[data-headtotal="${date}"]`).forEach(el=>el.textContent=`Fejenkénti összesen: ${fmt(headSum(e))} óra`);}
function setRole(r){state.role=r; if(r==="user") state.adminTab="days"; state.openDate=null; render();}
function requestAdmin(){const demo=state.mode!=="live";$("#passmsg").textContent=demo?"Demó jelszó: admin":"";
  $("#passinput").value=""; $("#passbg").classList.remove("hidden"); setTimeout(()=>$("#passinput").focus(),60);}
function bindMain(){
  document.querySelectorAll(".demo-bar .toggle button[data-role]").forEach(b=>b.onclick=()=>{ b.dataset.role==="admin"?requestAdmin():setRole("user"); });
  document.querySelectorAll(".adminnav button[data-tab]").forEach(b=>b.onclick=()=>{state.adminTab=b.dataset.tab;state.openDate=null;render();});
  const ga=$("#goadmin"); if(ga) ga.onclick=requestAdmin;
  const ea=$("#exitadmin"); if(ea) ea.onclick=()=>setRole("user");
  const lo=$("#logout"); if(lo) lo.onclick=async()=>{await state.client.auth.signOut();state.email=null;setRole("user");};
  document.querySelectorAll("[data-toggle]").forEach(btn=>btn.onclick=()=>{const dt=btn.dataset.toggle;state.openDate=state.openDate===dt?null:dt;render();});
  document.querySelectorAll("input[data-field],textarea[data-field]").forEach(el=>el.addEventListener("input",()=>{
    const {date,field}=el.dataset; (state.entries[date] ||= blank())[field]=el.value;
    setStatus(date,"módosítva, mentésre vár",""); if(field!=="note") updateTotals(date);}));
  document.querySelectorAll("[data-save]").forEach(b=>b.onclick=()=>openConfirm(b.dataset.save));
}
function openConfirm(date){state.pending=date;
  const d=new Date(date+"T00:00:00");
  $("#m-text").innerHTML=`Biztosan menti a(z) <b>${huWeek(d)}, ${huFull(d)}</b> napot?`;
  $("#modalbg").classList.remove("hidden");}

/* statikus modal-gombok */
$("#m-cancel").onclick=()=>{$("#modalbg").classList.add("hidden");state.pending=null;};
$("#m-ok").onclick=()=>{const d=state.pending;$("#modalbg").classList.add("hidden");state.pending=null;if(d)save(d);};
$("#pass-cancel").onclick=()=>{$("#passbg").classList.add("hidden");};
$("#pass-ok").onclick=()=>{ if($("#passinput").value===EFF_PASS){$("#passbg").classList.add("hidden");setRole("admin");} else $("#passmsg").textContent="Hibás jelszó."; };
$("#passinput").addEventListener("keydown",e=>{ if(e.key==="Enter") $("#pass-ok").click(); });

/* ---------- indítás ---------- */
(async function init(){
  state.theme = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light";
  document.documentElement.setAttribute("data-theme",state.theme);
  const live = CONFIG.SUPABASE_URL && CONFIG.SUPABASE_ANON_KEY;
  if(live){
    await new Promise((res,rej)=>{const s=document.createElement("script");
      s.src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js";s.onload=res;s.onerror=rej;document.head.appendChild(s);});
    state.mode="live"; state.client=window.supabase.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_ANON_KEY);
    const {data:{session}}=await state.client.auth.getSession();
    if(session){ state.email=session.user.email; state.role="user"; await loadAll(); }
    state.client.auth.onAuthStateChange(async(_e,sess)=>{ if(sess){state.email=sess.user.email; state.role="user"; await loadAll();} else state.email=null; render(); });
  } else {
    const set=(d,o)=>state.entries[d]={...blank(),...o};
    set(`${Y}-${pad(M)}-03`,{r_locsolas:"2",r_takaritas:"1",r_kerteszeti:"1",r_admin:"1",head_a:"4",head_b:"8",head_c:"8"});
    set(`${Y}-${pad(M)}-04`,{r_locsolas:"3",r_qta:"2",r_kerteszeti:"2",head_a:"8",head_b:"8",head_c:"8",head_d:"4"});
  }
  render();
})();
</script>
</body>
</html>
